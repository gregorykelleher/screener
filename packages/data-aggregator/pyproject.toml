[project]
name = "data-aggregator"
version = "0.1.0"
description = "data aggregator"
readme = "README.md"
requires-python = ">=3.12.5"
authors = [
    { name = "Gregory Kelleher", email = "gregory@gregorykelleher.com" }
]
dependencies = [
    "database>=0.1.0",
    "logging>=0.4.9.6",
    "python-dotenv>=1.0.1",
    "requests>=2.32.3",
    "typing>=3.10.0.0",
    "sqlalchemy>=2.0.37",
    "pydantic>=2.11.3",
    "httpx>=0.28.1",
    "pytest>=8.3.5",
    "pytest-asyncio>=0.26.0",
    "pytest-timeout>=2.3.1",
]

[build-system]
requires      = ["hatchling"]
build-backend = "hatchling.build"

[project.scripts]
data-aggregator = "data_aggregator.main:main"
